<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mamana AF</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--bg:#02181f;--sidebar:#021a22;--card:#042530;--cyan:#00d4e8;--cyan2:#00b8c8;--text:#c8f0f5;--muted:#5a9aaa;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  header{background:linear-gradient(90deg,#021f28,#043a48);padding:14px 24px;text-align:center;border-bottom:2px solid var(--cyan);flex-shrink:0;}
  header h1{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--cyan);letter-spacing:2px;font-style:italic;}
  .main{display:flex;flex:1;overflow:hidden;}
  .sidebar{width:220px;background:var(--sidebar);border-right:1px solid #0a3a45;display:flex;flex-direction:column;flex-shrink:0;}
  .search-box{padding:12px;border-bottom:1px solid #0a3a45;}
  .search-wrap{position:relative;}
  .search-wrap input{width:100%;background:#021820;border:1.5px solid var(--cyan);color:var(--text);padding:8px 36px 8px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:0.95rem;outline:none;}
  .search-wrap input::placeholder{color:var(--muted);}
  .search-wrap svg{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--cyan);}
  .game-list{flex:1;overflow-y:auto;padding:8px;}
  .game-list::-webkit-scrollbar{width:4px;}
  .game-list::-webkit-scrollbar-thumb{background:var(--cyan2);border-radius:4px;}
  .game-btn{width:100%;background:#021e28;border:1.5px solid #0a4a58;color:var(--text);padding:10px 14px;margin-bottom:6px;border-radius:6px;text-align:left;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.95rem;transition:all 0.2s;}
  .game-btn:hover{border-color:var(--cyan);background:#042d3a;color:var(--cyan);}
  .game-btn.active{background:var(--cyan);color:#021820;font-weight:600;border-color:var(--cyan);}
  .empty-list{color:var(--muted);font-size:0.85rem;text-align:center;padding:20px 10px;}
  .sidebar-footer{padding:12px;border-top:1px solid #0a3a45;}
  .admin-btn{width:100%;background:#021e28;border:1.5px solid #0a4a58;color:var(--muted);padding:10px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.9rem;display:flex;align-items:center;gap:8px;transition:all 0.2s;}
  .admin-btn:hover{border-color:var(--cyan);color:var(--cyan);}
  .content{flex:1;padding:24px;display:flex;flex-direction:column;overflow:hidden;}
  .preview-box{background:var(--card);border:1.5px solid #0a4a58;border-radius:8px;width:100%;aspect-ratio:16/9;max-height:260px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .preview-box img{width:100%;height:100%;object-fit:cover;border-radius:6px;}
  .preview-placeholder{color:var(--muted);font-size:0.9rem;}
  .desc-area{margin-top:16px;flex:1;}
  .desc-area h3{color:var(--cyan);font-size:0.85rem;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;}
  .desc-area p{color:var(--text);font-size:1rem;line-height:1.6;opacity:0.85;}
  .link-btn-wrap{display:flex;justify-content:flex-end;margin-top:12px;}
  .link-game-btn{background:var(--cyan);color:#021820;border:none;padding:10px 22px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;letter-spacing:1px;transition:background 0.2s;}
  .link-game-btn:hover{background:var(--cyan2);}
  .link-game-btn.hidden{display:none;}
  .no-select{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:1rem;}
  .loading-bar{height:3px;background:var(--cyan);width:0%;transition:width 0.4s;position:fixed;top:0;left:0;z-index:9999;}
  .overlay{position:fixed;inset:0;background:rgba(2,15,20,0.96);display:none;align-items:center;justify-content:center;z-index:999;}
  .overlay.show{display:flex;}
  .pass-box{background:var(--card);border:2px solid var(--cyan);border-radius:10px;padding:40px 32px;width:340px;text-align:center;}
  .pass-box h2{font-family:'Cinzel',serif;color:var(--cyan);margin-bottom:24px;font-size:1.2rem;letter-spacing:2px;}
  .pass-row{display:flex;}
  .pass-row input{flex:1;background:#021820;border:1.5px solid var(--cyan);border-right:none;color:var(--text);padding:10px 14px;font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;border-radius:6px 0 0 6px;}
  .pass-row button{background:var(--cyan);color:#021820;border:none;padding:10px 18px;font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;border-radius:0 6px 6px 0;}
  .pass-error{color:#ff6b6b;font-size:0.85rem;margin-top:10px;min-height:18px;}
  .pass-cancel{margin-top:14px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.9rem;}
  .pass-cancel:hover{color:var(--text);}
</style>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<header><h1>Mamana AF</h1></header>
<div class="main">
  <div class="sidebar">
    <div class="search-box">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Cari game..." oninput="filterGames()"/>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
    </div>
    <div class="game-list" id="gameList"><div class="empty-list">Memuat data...</div></div>
    <div class="sidebar-footer">
      <button class="admin-btn" onclick="showPasswordOverlay()">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5S14.7 2 12 2 7 4.3 7 7s2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
        Admin mode
      </button>
    </div>
  </div>
  <div class="content">
    <div class="no-select" id="noSelect">← Pilih game untuk melihat detail</div>
    <div id="gameDetail" style="display:none;flex-direction:column;height:100%;">
      <div class="preview-box" id="previewBox"><span class="preview-placeholder">Gambar akan muncul</span></div>
      <div class="desc-area">
        <h3>Deskripsi game :</h3>
        <p id="gameDesc">-</p>
      </div>
      <div class="link-btn-wrap">
        <a id="linkGameBtn" class="link-game-btn hidden" href="#" target="_blank">Link game &rarr;</a>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="passOverlay">
  <div class="pass-box">
    <h2>Password</h2>
    <div class="pass-row">
      <input type="password" id="passInput" placeholder="Masukkan password..." onkeydown="if(event.key==='Enter')checkPass()"/>
      <button onclick="checkPass()">Masuk</button>
    </div>
    <div class="pass-error" id="passError"></div>
    <button class="pass-cancel" onclick="hidePasswordOverlay()">Batal</button>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9DZDFtgwn2jqv2-pj-udbiTHt34amyiGjw03Peig7TAiDfdN1Yd-nqyeK8oH8BdCumg/exec';
  const PASS_HASH  = '752fdf2b4c7f92170035914870aaedab927bf9f8dddc448f3089f1e2f03e8b68';
  let games = [];
  let selectedId = null;

  async function loadGames(){
    setLoading(true);
    try {
      const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
      const data = await res.json();
      games = Array.isArray(data) ? data : [];
    } catch(e){ games = []; }
    setLoading(false);
    renderList(games);
  }

  function setLoading(on){
    const bar = document.getElementById('loadingBar');
    bar.style.width = on ? '70%' : '100%';
    if(!on) setTimeout(()=>{ bar.style.width='0%'; }, 400);
  }

  function renderList(list){
    const el = document.getElementById('gameList');
    if(list.length===0){ el.innerHTML='<div class="empty-list">Belum ada game</div>'; return; }
    el.innerHTML = list.map(g=>`
      <button class="game-btn ${selectedId===g.id?'active':''}" onclick="selectGame('${g.id}')">${g.title}</button>
    `).join('');
  }

  function selectGame(id){
    selectedId = id;
    const g = games.find(x=>x.id===id);
    if(!g) return;
    document.getElementById('noSelect').style.display='none';
    const detail = document.getElementById('gameDetail');
    detail.style.display='flex';
    document.getElementById('previewBox').innerHTML = g.image
      ? `<img src="${g.image}" alt="${g.title}"/>`
      : '<span class="preview-placeholder">Tidak ada gambar</span>';
    document.getElementById('gameDesc').textContent = g.desc || '-';
    const lb = document.getElementById('linkGameBtn');
    if(g.link){ lb.href=g.link; lb.classList.remove('hidden'); }
    else { lb.classList.add('hidden'); }
    renderList(games);
  }

  function filterGames(){
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderList(games.filter(g=>g.title.toLowerCase().includes(q)));
  }

  async function hashPassword(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  function showPasswordOverlay(){
    document.getElementById('passOverlay').classList.add('show');
    document.getElementById('passInput').value='';
    document.getElementById('passError').textContent='';
    document.getElementById('passInput').focus();
  }
  function hidePasswordOverlay(){
    document.getElementById('passOverlay').classList.remove('show');
  }
  async function checkPass(){
    const v = document.getElementById('passInput').value;
    const h = await hashPassword(v);
    if(h===PASS_HASH){
      hidePasswordOverlay();
      window.location.href='admin.html';
    } else {
      document.getElementById('passError').textContent='Password salah!';
      document.getElementById('passInput').value='';
      document.getElementById('passInput').focus();
    }
  }

  // Auto refresh setiap 10 detik
  setInterval(loadGames, 10000);
  loadGames();
</script>
</body>
</html>
