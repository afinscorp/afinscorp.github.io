<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mamana AF - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--bg:#02181f;--sidebar:#021a22;--card:#042530;--cyan:#00d4e8;--cyan2:#00b8c8;--text:#c8f0f5;--muted:#5a9aaa;--danger:#e84040;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  header{background:linear-gradient(90deg,#021f28,#043a48);padding:14px 24px;text-align:center;border-bottom:2px solid var(--cyan);flex-shrink:0;}
  header h1{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--cyan);letter-spacing:2px;font-style:italic;}
  .main{display:flex;flex:1;overflow:hidden;}
  .sidebar{width:220px;background:var(--sidebar);border-right:1px solid #0a3a45;display:flex;flex-direction:column;flex-shrink:0;}
  .search-box{padding:12px;border-bottom:1px solid #0a3a45;}
  .search-wrap{position:relative;}
  .search-wrap input{width:100%;background:#021820;border:1.5px solid var(--cyan);color:var(--text);padding:8px 36px 8px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:0.95rem;outline:none;}
  .search-wrap input::placeholder{color:var(--muted);}
  .search-wrap svg{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--cyan);}
  .game-list{flex:1;overflow-y:auto;padding:8px;}
  .game-list::-webkit-scrollbar{width:4px;}
  .game-list::-webkit-scrollbar-thumb{background:var(--cyan2);border-radius:4px;}
  .game-item{width:100%;background:#021e28;border:1.5px solid #0a4a58;color:var(--text);padding:10px;margin-bottom:6px;border-radius:6px;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.2s;}
  .game-item:hover{border-color:var(--cyan);}
  .game-item span{font-size:0.9rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 4px;border-radius:4px;transition:color 0.2s;flex-shrink:0;}
  .del-btn:hover{color:var(--danger);}
  .add-wrap{padding:10px;}
  .add-btn{width:100%;background:var(--cyan);color:#021820;border:none;padding:10px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;cursor:pointer;transition:background 0.2s;}
  .add-btn:hover{background:var(--cyan2);}
  .sidebar-footer{padding:12px;border-top:1px solid #0a3a45;}
  .logout-btn{width:100%;background:#021e28;border:1.5px solid #0a4a58;color:var(--muted);padding:10px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.9rem;display:flex;align-items:center;gap:8px;transition:all 0.2s;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
  .content{flex:1;padding:24px;overflow-y:auto;}
  .content::-webkit-scrollbar{width:4px;}
  .content::-webkit-scrollbar-thumb{background:var(--cyan2);border-radius:4px;}
  .idle-msg{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);}
  .form-wrap{display:none;}
  .form-wrap.show{display:block;}
  .form-title{font-family:'Cinzel',serif;color:var(--cyan);font-size:1.2rem;text-align:center;margin-bottom:28px;letter-spacing:2px;}
  .form-grid{display:grid;grid-template-columns:1fr 220px;gap:20px;}
  .form-left{display:flex;flex-direction:column;gap:14px;}
  .form-input{background:#021820;border:1.5px solid #0a4a58;color:var(--text);padding:12px 16px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:border-color 0.2s;}
  .form-input:focus{border-color:var(--cyan);}
  .form-input::placeholder{color:var(--muted);}
  .img-upload{background:#021820;border:1.5px dashed #0a4a58;border-radius:6px;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.2s;overflow:hidden;position:relative;}
  .img-upload:hover{border-color:var(--cyan);}
  .img-upload img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
  .img-label{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);font-size:0.85rem;z-index:1;}
  .form-actions{display:flex;justify-content:flex-end;margin-top:20px;}
  .finish-btn{background:var(--cyan);color:#021820;border:none;padding:10px 28px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:background 0.2s;}
  .finish-btn:hover{background:var(--cyan2);}
  .finish-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .cancel-form-btn{background:none;border:1.5px solid #0a4a58;color:var(--muted);padding:10px 20px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:1rem;cursor:pointer;margin-right:10px;transition:all 0.2s;}
  .cancel-form-btn:hover{border-color:var(--danger);color:var(--danger);}
  .loading-bar{height:3px;background:var(--cyan);width:0%;transition:width 0.4s;position:fixed;top:0;left:0;z-index:9999;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--cyan);color:#021820;padding:10px 20px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.95rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;}
  .toast.show{opacity:1;}
  .overlay{position:fixed;inset:0;background:rgba(2,15,20,0.9);display:none;align-items:center;justify-content:center;z-index:999;}
  .overlay.show{display:flex;}
  .confirm-box{background:var(--card);border:2px solid var(--danger);border-radius:10px;padding:32px 28px;width:300px;text-align:center;}
  .confirm-box h3{font-family:'Cinzel',serif;color:var(--danger);margin-bottom:12px;}
  .confirm-box p{color:var(--text);margin-bottom:20px;font-size:0.95rem;}
  .confirm-btns{display:flex;gap:10px;justify-content:center;}
  .btn-yes{background:var(--danger);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;}
  .btn-no{background:none;border:1.5px solid #0a4a58;color:var(--muted);padding:8px 20px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;}
</style>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<header><h1>Mamana AF (Admin)</h1></header>
<div class="main">
  <div class="sidebar">
    <div class="search-box">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Cari game..." oninput="filterGames()"/>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
    </div>
    <div class="game-list" id="gameList"><div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:16px;">Memuat...</div></div>
    <div class="add-wrap">
      <button class="add-btn" onclick="showForm()">+</button>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="window.location.href='index.html'">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Keluar Admin
      </button>
    </div>
  </div>

  <div class="content" id="mainContent">
    <div class="idle-msg" id="idleMsg">Klik <b style="color:var(--cyan);margin:0 4px">+</b> untuk menambah game baru</div>
    <div class="form-wrap" id="formWrap">
      <div class="form-title">Link Game Baru</div>
      <div class="form-grid">
        <div class="form-left">
          <input class="form-input" type="text" id="fTitle" placeholder="Judul game"/>
          <input class="form-input" type="text" id="fDesc" placeholder="Diskripsi"/>
          <input class="form-input" type="text" id="fLink" placeholder="Link game"/>
        </div>
        <div>
          <div class="img-upload" id="imgUpload" onclick="document.getElementById('fImg').click()">
            <img id="imgPreview" src="" style="display:none;"/>
            <div class="img-label" id="imgLabel">
              <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              Klik untuk pilih gambar
            </div>
            <input type="file" id="fImg" accept="image/*" style="display:none;" onchange="previewImg(event)"/>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="cancel-form-btn" onclick="hideForm()">Batal</button>
        <button class="finish-btn" id="finishBtn" onclick="saveGame()">Finish</button>
      </div>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Hapus Game</h3>
    <p id="confirmMsg">Yakin hapus game ini?</p>
    <div class="confirm-btns">
      <button class="btn-no" onclick="hideConfirm()">Batal</button>
      <button class="btn-yes" onclick="confirmDelete()">Hapus</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxyHqtLh4pXwASpmanzx-3XUu-1YBqaDezCBv_yHHD97RJdz2_4YFQfSfeIMmfChNbRGQ/exec';
  let games = [];
  let deleteTarget = null;
  let imgBase64 = null;

  async function loadGames(){
    setLoading(true);
    try {
      const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
      const data = await res.json();
      games = Array.isArray(data) ? data : [];
    } catch(e){ games = []; }
    setLoading(false);
    renderList(games);
  }

  function setLoading(on){
    const bar = document.getElementById('loadingBar');
    bar.style.width = on ? '70%' : '100%';
    if(!on) setTimeout(()=>{ bar.style.width='0%'; }, 400);
  }

  function renderList(list){
    const el = document.getElementById('gameList');
    if(list.length===0){ el.innerHTML='<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:16px;">Belum ada game</div>'; return; }
    el.innerHTML = list.map(g=>`
      <div class="game-item">
        <span>${g.title}</span>
        <button class="del-btn" onclick="askDelete('${g.id}','${g.title.replace(/'/g,"&#39;")}')" title="Hapus">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    `).join('');
  }

  function filterGames(){
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderList(games.filter(g=>g.title.toLowerCase().includes(q)));
  }

  function showForm(){
    document.getElementById('idleMsg').style.display='none';
    document.getElementById('formWrap').classList.add('show');
    document.getElementById('fTitle').value='';
    document.getElementById('fDesc').value='';
    document.getElementById('fLink').value='';
    document.getElementById('fImg').value='';
    document.getElementById('imgPreview').style.display='none';
    document.getElementById('imgLabel').style.display='flex';
    imgBase64=null;
    document.getElementById('fTitle').focus();
  }

  function hideForm(){
    document.getElementById('formWrap').classList.remove('show');
    document.getElementById('idleMsg').style.display='flex';
  }

  function previewImg(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      imgBase64 = ev.target.result;
      document.getElementById('imgPreview').src = imgBase64;
      document.getElementById('imgPreview').style.display='block';
      document.getElementById('imgLabel').style.display='none';
    };
    reader.readAsDataURL(file);
  }

  async function saveGame(){
    const title = document.getElementById('fTitle').value.trim();
    const desc  = document.getElementById('fDesc').value.trim();
    const link  = document.getElementById('fLink').value.trim();
    if(!title){ showToast('Judul game wajib diisi!'); document.getElementById('fTitle').focus(); return; }

    const btn = document.getElementById('finishBtn');
    btn.disabled = true;
    btn.textContent = 'Menyimpan...';
    setLoading(true);

    try {
      const id = 'g_' + Date.now();
      await postData({ action:'add', id, title, desc, link, image: imgBase64||'' });
      await loadGames();
      hideForm();
      showToast('Game berhasil ditambahkan!');
    } catch(e){
      showToast('Gagal menyimpan, coba lagi.');
    }

    btn.disabled = false;
    btn.textContent = 'Finish';
    setLoading(false);
  }

  function askDelete(id, title){
    deleteTarget = id;
    document.getElementById('confirmMsg').textContent = `Yakin hapus "${title}"?`;
    document.getElementById('confirmOverlay').classList.add('show');
  }
  function hideConfirm(){
    document.getElementById('confirmOverlay').classList.remove('show');
    deleteTarget = null;
  }
  async function confirmDelete(){
    if(!deleteTarget) return;
    hideConfirm();
    setLoading(true);
    try {
      await postData({ action:'delete', id: deleteTarget });
      await loadGames();
      showToast('Game dihapus.');
    } catch(e){
      showToast('Gagal menghapus, coba lagi.');
    }
    setLoading(false);
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
  }

  // Helper POST pakai no-cors (Apps Script workaround)
  function postData(payload){
    return new Promise((resolve) => {
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = SCRIPT_URL;
      form.target = 'hidden_iframe';
      form.style.display = 'none';

      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'payload';
      input.value = JSON.stringify(payload);
      form.appendChild(input);

      let iframe = document.getElementById('hidden_iframe');
      if(!iframe){
        iframe = document.createElement('iframe');
        iframe.name = 'hidden_iframe';
        iframe.id = 'hidden_iframe';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
      }

      iframe.onload = () => { setTimeout(resolve, 500); };
      document.body.appendChild(form);
      form.submit();
      document.body.removeChild(form);
    });
  }

  loadGames();
</script>
</body>
</html>
